<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Sahay - AI Crop Doctor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <h1>Krishi Sahay ☘️</h1>
                <p>Your AI Crop Doctor</p>
            </div>
            <div class="lang-selector">
                <select id="language" onchange="changeLanguage()">
                    <option value="en">English</option>
                    <option value="hi">हिंदी</option>
                    <option value="te">తెలుగు</option>
                </select>
            </div>
        </header>

        <div class="chat-container" id="chat-box">
            <div class="message bot">
                Hello! I am Krishi Sahay. Ask me anything about agriculture, or upload a picture of a tomato or pepper leaf for disease detection!
            </div>
        </div>

        <div class="input-area">
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                📷
            </button>
            <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="handleImageUpload(this)">
            
            <input type="text" id="chat-input" placeholder="Type your message..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
